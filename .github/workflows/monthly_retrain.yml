name: Monthly CPI Retraining & Deploy

on:
  schedule:
    - cron: '0 0 25 * *'
  workflow_dispatch:

env:
  # Opt into Node.js 24 as requested by the deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GCP_REGION: europe-west1 (Belgium)
  REPOSITORY: cpi-repo
  IMAGE_NAME: sa-cpi-api
  SERVICE_NAME: sa-cpi-api

jobs:
  retrain:
    runs-on: ubuntu-latest
    outputs:
      commit_hash: ${{ steps.commit.outputs.commit_hash }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
            cd sa_forecaster_api
            pip install -r orchestrator_requirements.txt

      - name: Run Pipeline
        run: |
            cd sa_forecaster_api
            python run_pipeline.py --retrain

      - name: Commit and Push changes
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ models/
          git commit -m "Automated monthly model retrain [skip ci]" || echo "No changes to commit"
          git push
          echo "commit_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  containerize_deploy:
    needs: retrain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout updated code
        uses: actions/checkout@v4 # Upgraded from v3
        with:
          ref: main

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2' # Upgraded to latest v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2' # Upgraded to latest v2

      - name: Authorize Docker
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and Push Container
        run: |
          cd sa_forecaster_api
          docker build -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: 'google-github-actions/deploy-cloudrun@v2' # Upgraded to latest v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: '--allow-unauthenticated --memory=1Gi --cpu=1'
